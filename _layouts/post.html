---
layout: default
---
<article>
  <a href="{{ '/' | relative_url }}" class="back-link">&larr; Back</a>
  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      {{ page.date | date: "%Y年%m月%d日" }}
      {% if page.tags.size > 0 %}
      <div class="post-tags" style="margin-top: 8px;">
        {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
        {% endfor %}
      </div>
      {% endif %}
    </div>
  </div>
  <div class="post-content">
    {{ content }}
  </div>
</article>
